name: Java CI with Maven

on:
  push:
    branches: [ "main" ] # Triggers the build automatically when code is pushed to the main branch
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25' # Compiles using modern Java 25 standard matching the pom.xml
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package # Cleans temporary files and packages into a proper root-structured JAR

    - name: Upload Compiled JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VerifyBridge-Final-JAR
        path: target/*.jar # Extracts only the final clean plugin JAR from the target directory
